<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書封頭像 — 配色比較</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #ecebf4;
    --fg:       #2d3848;
    --fg-dim:   rgba(45, 56, 72, 0.55);
    --cover-mid:  #21566f;
    --cover-base: #173449;
    --cover-low:  #0f2130;
  }

  html, body { height: 100%; background: var(--bg); color: var(--fg); }
  body {
    font-family: system-ui, -apple-system, 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 40px;
    padding: 80px 20px 60px;
  }

  .page-title { text-align: center; }
  .page-title h1 { font: 600 16px/1.5 Georgia, 'Noto Serif TC', serif; letter-spacing: .04em; }
  .page-title p { margin-top: 6px; font-size: 12px; color: var(--fg-dim); }

  .row {
    display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: center;
    gap: 36px;
  }

  .panel { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  .cover {
    position: relative;
    width: 220px;
    height: 420px;
    border-radius: 18px 4px 4px 18px;
    background:
      radial-gradient(circle at 42% 18%, rgba(255,255,255,.08), transparent 28%),
      linear-gradient(142deg, var(--cover-mid) 0%, var(--cover-base) 46%, var(--cover-low) 100%);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.06),
      inset -18px 0 30px -20px rgba(0,0,0,.55),
      inset 0 0 60px rgba(0,0,0,.25),
      0 12px 28px rgba(20, 30, 45, .28);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .cover::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      100deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px,
      transparent 1px, transparent 7px
    );
  }
  .cover .spine-edge {
    position: absolute; top: 0; right: 0; bottom: 0; width: 10px;
    background: linear-gradient(to left, rgba(0,0,0,.3), transparent);
  }

  .figure-svg { position: relative; width: 52%; }

  .mode-solid .fill-part { fill: var(--figure-color); }
  .mode-line .fill-part {
    fill: none;
    stroke: var(--figure-color);
    stroke-width: 3.5;
    stroke-linejoin: round;
    stroke-linecap: round;
  }

  .label { text-align: center; }
  .label .swatch {
    display: inline-block; width: 11px; height: 11px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle;
    background: var(--figure-color);
  }
  .mode-line .label .swatch { background: none; border: 2px solid var(--figure-color); }
  .label .name { font-size: 12px; font-weight: 600; }
  .label .hex { font-size: 11px; color: var(--fg-dim); font-variant-numeric: tabular-nums; margin-top: 2px; }
</style>
</head>

  <div class="page-title">

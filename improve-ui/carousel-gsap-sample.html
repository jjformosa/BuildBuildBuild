<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carousel GSAP — Darkroom Reveal</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f2;
    --fg: #1a1814;
    --muted: rgba(26,24,20,0.18);
    --dur-slide: 0.46s;
    --dur-open: 0.52s;
    --dur-close: 0.32s;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 2rem;
    padding: 2rem;
  }

  h1 {
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--fg);
    opacity: 0.4;
  }

  /* ─── Carousel ─── */
  .carousel-wrap {
    width: 100%;
    max-width: 420px;
  }

  .carousel-viewport {
    position: relative;
    width: 100%;
    overflow: hidden;
    background: var(--muted);
    border-radius: 4px;
  }

  .carousel-track {
    display: flex;
    will-change: transform;
  }

  .carousel-slide {
    flex: 0 0 100%;
    aspect-ratio: 4/3;
    position: relative;
    cursor: zoom-in;
    overflow: hidden;
  }

  .carousel-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    user-select: none;
  }

  /* caption overlay — optional texture cue */
  .slide-num {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.05em;
    pointer-events: none;
  }

  /* nav arrows */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.82);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 6px rgba(0,0,0,0.12);
    transition: background 0.15s;
  }
  .nav-btn:hover { background: #fff; }
  .nav-btn.prev { left: 10px; }
  .nav-btn.next { right: 10px; }
  .nav-btn svg { width: 18px; height: 18px; }

  /* dots */
  .dots {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    height: 32px;
  }
  .dot {
    height: 5px;
    border-radius: 9999px;
    background: var(--fg);
    opacity: 0.2;
    border: none;
    cursor: pointer;
    transition: width 0.2s, opacity 0.2s;
    width: 5px;
  }
  .dot.active { width: 16px; opacity: 0.5; }

  /* ─── Lightbox ─── */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #0d0c0a;
    display: flex;
    align-items: center;
    justify-content: center;
    /* start hidden — GSAP drives autoAlpha */
    visibility: hidden;
    opacity: 0;
  }

  .lb-img-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 56px 56px 56px 56px;
  }

  .lb-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    /* clip-path driven by GSAP */
    clip-path: inset(40% round 2px);
    will-change: clip-path, transform, opacity;
  }

  .lb-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    transition: background 0.15s;
    z-index: 2;
  }
  .lb-close:hover { background: rgba(255,255,255,0.22); }

  .lb-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    transition: background 0.15s;
    z-index: 2;
  }
  .lb-arrow:hover { background: rgba(255,255,255,0.2); }
  .lb-arrow.lb-prev { left: 10px; }
  .lb-arrow.lb-next { right: 10px; }
  .lb-arrow.lb-prev svg { transform: rotate(180deg); }
  .lb-arrow[disabled] { opacity: 0.2; pointer-events: none; }

  .lb-dots {
    position: absolute;
    bottom: 18px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .lb-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fff;
    border: none;
    cursor: pointer;
    opacity: 0.3;
    transition: opacity 0.15s;
  }
  .lb-dot.active { opacity: 1; width: 8px; height: 8px; }

  /* state: animating — disables all interaction */
  .is-animating { pointer-events: none !important; }

  /* hint */
  .hint {
    font-size: 0.7rem;
    color: var(--fg);
    opacity: 0.3;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<h1>Darkroom Reveal — GSAP Preview</h1>

<!-- ─── Carousel ─── -->
<div class="carousel-wrap">
  <div class="carousel-viewport" id="viewport">
    <div class="carousel-track" id="track">

      <div class="carousel-slide" data-index="0">
        <img src="https://images.unsplash.com/photo-1516589091380-5d8e87df6999?w=840&q=80" alt="1" />
        <span class="slide-num">1 / 4</span>
      </div>

      <div class="carousel-slide" data-index="1">
        <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=840&q=80" alt="2" />
        <span class="slide-num">2 / 4</span>
      </div>

      <div class="carousel-slide" data-index="2">
        <img src="https://images.unsplash.com/photo-1529180979161-06b8b6d6f2be?w=840&q=80" alt="3" />
        <span class="slide-num">3 / 4</span>
      </div>

      <div class="carousel-slide" data-index="3">
        <img src="https://images.unsplash.com/photo-1519741347686-c1e0aadf4611?w=840&q=80" alt="4" />
        <span class="slide-num">4 / 4</span>
      </div>

    </div>

    <button class="nav-btn prev" id="prevBtn" aria-label="上一張">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M11 4L6 9L11 14" />
      </svg>
    </button>
    <button class="nav-btn next" id="nextBtn" aria-label="下一張">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M7 4L12 9L7 14" />
      </svg>
    </button>
  </div>

  <div class="dots" id="dots">
    <button class="dot active" data-i="0"></button>
    <button class="dot" data-i="1"></button>
    <button class="dot" data-i="2"></button>
    <button class="dot" data-i="3"></button>
  </div>
</div>

<p class="hint">點擊圖片開啟 Lightbox — 感受「暗房顯影」</p>

<!-- ─── Lightbox ─── -->
<div class="lightbox" id="lightbox">
  <div class="lb-img-wrap">
    <img class="lb-img" id="lbImg" src="" alt="" />
  </div>

  <button class="lb-close" id="lbClose" aria-label="關閉">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M3 3L13 13M13 3L3 13" />
    </svg>
  </button>

  <button class="lb-arrow lb-prev" id="lbPrev" aria-label="上一張">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M11 4L6 9L11 14" />
    </svg>
  </button>

  <button class="lb-arrow lb-next" id="lbNext" aria-label="下一張">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M7 4L12 9L7 14" />
    </svg>
  </button>

  <div class="lb-dots" id="lbDots"></div>
</div>

<script>
// ─── Config (single source of truth) ───────────────────────────────────────
const CFG = {
  carousel: {
    slideDur: 0.44,
    slideEase: 'power2.inOut',
    slideOffset: 60,       // px, the x travel distance of incoming/outgoing slides
    scaleFrom: 0.94,       // incoming slide starts at this scale
  },
  lightbox: {
    bgDur: 0.28,
    bgEase: 'power2.inOut',
    openDur: 0.52,
    openEase: 'power2.out',
    closeDur: 0.30,
    closeEase: 'power2.in',
    clipOpenFrom: '40%',   // clip-path inset start (open) and end (close)
    clipOpenTo:   '0%',
    scaleFrom: 1.06,       // image starts slightly oversized on open
    innerChangeDur: 0.38,
    innerChangeEase: 'power2.inOut',
    innerOffset: 50,
  },
};

// ─── Carousel state ─────────────────────────────────────────────────────────
const slides = Array.from(document.querySelectorAll('.carousel-slide'));
const track  = document.getElementById('track');
const dots   = Array.from(document.querySelectorAll('.dot'));
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
let current = 0;
let isSliding = false;

function slideWidth() {
  return slides[0].getBoundingClientRect().width;
}

// Position slides immediately without animation
function initSlides() {
  slides.forEach((sl, i) => {
    gsap.set(sl, { x: i * slideWidth(), position: 'absolute', top: 0, left: 0 });
  });
  gsap.set(track, { position: 'relative', height: slides[0].offsetHeight });
}
initSlides();
window.addEventListener('resize', () => { if (!isSliding) initSlides(); });

function updateDots(idx) {
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  prevBtn.style.display = idx === 0 ? 'none' : '';
  nextBtn.style.display = idx === slides.length - 1 ? 'none' : '';
}
updateDots(0);

function goTo(next, direction) {
  if (isSliding || next === current || next < 0 || next >= slides.length) return;
  isSliding = true;

  const outgoing = slides[current];
  const incoming = slides[next];
  const W = slideWidth();
  const c = CFG.carousel;

  // Incoming starts off-screen in the direction of travel
  gsap.set(incoming, { x: direction > 0 ? W + c.slideOffset : -W - c.slideOffset, scale: c.scaleFrom, autoAlpha: 0.6 });

  const tl = gsap.timeline({
    defaults: { duration: c.slideDur, ease: c.slideEase },
    onComplete: () => {
      gsap.set(outgoing, { autoAlpha: 0 });
      current = next;
      isSliding = false;
      updateDots(next);
    }
  });

  // Both slides move simultaneously
  tl.to(outgoing, {
    x: direction > 0 ? -W - c.slideOffset * 0.5 : W + c.slideOffset * 0.5,
    scale: 0.96,
    autoAlpha: 0,
  }, 0);

  tl.to(incoming, {
    x: 0,
    scale: 1,
    autoAlpha: 1,
  }, 0);
}

prevBtn.addEventListener('click', () => goTo(current - 1, -1));
nextBtn.addEventListener('click', () => goTo(current + 1, 1));
dots.forEach((d, i) => d.addEventListener('click', () => goTo(i, i > current ? 1 : -1)));

// ─── Lightbox ───────────────────────────────────────────────────────────────
const lightbox = document.getElementById('lightbox');
const lbImg    = document.getElementById('lbImg');
const lbClose  = document.getElementById('lbClose');
const lbPrev   = document.getElementById('lbPrev');
const lbNext   = document.getElementById('lbNext');
const lbDotsEl = document.getElementById('lbDots');

const IMAGES = [
  'https://images.unsplash.com/photo-1516589091380-5d8e87df6999?w=1400&q=85',
  'https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=1400&q=85',
  'https://images.unsplash.com/photo-1529180979161-06b8b6d6f2be?w=1400&q=85',
  'https://images.unsplash.com/photo-1519741347686-c1e0aadf4611?w=1400&q=85',
];

// Build lb dots
IMAGES.forEach((_, i) => {
  const d = document.createElement('button');
  d.className = 'lb-dot' + (i === 0 ? ' active' : '');
  d.setAttribute('aria-label', `第 ${i+1} 張`);
  d.addEventListener('click', () => lbGoTo(i, i > lbIdx ? 1 : -1));
  lbDotsEl.appendChild(d);
});
const lbDotBtns = Array.from(lbDotsEl.querySelectorAll('.lb-dot'));

let lbIdx = 0;
let lbAnimating = false;
let lbOpen = false;
let openTween = null;

function lbUpdateControls() {
  lbDotBtns.forEach((d, i) => d.classList.toggle('active', i === lbIdx));
  lbPrev.disabled = lbIdx === 0;
  lbNext.disabled = lbIdx === IMAGES.length - 1;
}

// THE MOMENT — darkroom reveal open
function openLightbox(index) {
  if (lbAnimating) return;
  lbAnimating = true;
  lbOpen = true;
  lbIdx = index;
  lbImg.src = IMAGES[index];
  lbUpdateControls();
  document.body.style.overflow = 'hidden';

  const c = CFG.lightbox;

  // Set initial state
  gsap.set(lightbox, { autoAlpha: 0 });
  gsap.set(lbImg, {
    scale: c.scaleFrom,
    clipPath: `inset(${c.clipOpenFrom} round 3px)`,
    autoAlpha: 0,
  });

  const tl = gsap.timeline({
    onComplete: () => { lbAnimating = false; }
  });

  // 1. Background fades in first (the darkroom lights go out)
  tl.to(lightbox, { autoAlpha: 1, duration: c.bgDur, ease: c.bgEase });

  // 2. Image reveals — clip-path expands + scale settles (THE MOMENT)
  tl.to(lbImg, {
    autoAlpha: 1,
    scale: 1,
    clipPath: `inset(${c.clipOpenTo} round 0px)`,
    duration: c.openDur,
    ease: c.openEase,
  }, `-=${c.bgDur * 0.6}`); // slight overlap: starts as bg is still coming in
}

function closeLightbox() {
  if (lbAnimating || !lbOpen) return;
  lbAnimating = true;
  lbOpen = false;
  document.body.style.overflow = '';

  const c = CFG.lightbox;
  const tl = gsap.timeline({
    onComplete: () => {
      gsap.set(lightbox, { autoAlpha: 0 });
      lbAnimating = false;
    }
  });

  // Image collapses back in (reverse reveal)
  tl.to(lbImg, {
    scale: 0.94,
    autoAlpha: 0,
    clipPath: `inset(35% round 2px)`,
    duration: c.closeDur,
    ease: c.closeEase,
  });

  // Background fades out slightly after
  tl.to(lightbox, {
    autoAlpha: 0,
    duration: c.closeDur * 0.9,
    ease: c.bgEase,
  }, '-=0.1');
}

// Lightbox internal slide change
function lbGoTo(next, direction) {
  if (lbAnimating || next === lbIdx || next < 0 || next >= IMAGES.length) return;
  lbAnimating = true;

  const c = CFG.lightbox;
  const oldSrc = lbImg.src;
  lbIdx = next;
  lbUpdateControls();

  // Fade out current
  const tl = gsap.timeline({
    onComplete: () => { lbAnimating = false; }
  });

  tl.to(lbImg, {
    x: direction < 0 ? c.innerOffset : -c.innerOffset,
    scale: 0.94,
    autoAlpha: 0,
    duration: c.innerChangeDur * 0.45,
    ease: 'power2.in',
    onComplete: () => {
      lbImg.src = IMAGES[next];
      gsap.set(lbImg, {
        x: direction > 0 ? c.innerOffset : -c.innerOffset,
        scale: 0.96,
        autoAlpha: 0,
      });
    }
  });

  tl.to(lbImg, {
    x: 0,
    scale: 1,
    autoAlpha: 1,
    duration: c.innerChangeDur * 0.55,
    ease: 'power2.out',
  });
}

// Attach events to carousel slides
slides.forEach((sl, i) => {
  sl.addEventListener('click', () => openLightbox(i));
});

lbClose.addEventListener('click', closeLightbox);
lbPrev.addEventListener('click', () => lbGoTo(lbIdx - 1, -1));
lbNext.addEventListener('click', () => lbGoTo(lbIdx + 1, 1));

// Keyboard
window.addEventListener('keydown', (e) => {
  if (!lbOpen) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbGoTo(lbIdx - 1, -1);
  if (e.key === 'ArrowRight') lbGoTo(lbIdx + 1, 1);
});
</script>
</body>
</html>

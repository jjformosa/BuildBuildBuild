<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>入場動畫提案 — Hajimede</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf9;
      --foreground: #1c1917;
      --fg-60: rgba(28, 25, 23, 0.6);
      --fg-40: rgba(28, 25, 23, 0.4);
      --fg-20: rgba(28, 25, 23, 0.2);
      --primary: #e85d35;
      --white: #ffffff;
      --radius: 10px;
    }

    body {
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--foreground);
    }

    /* ── Layout ── */
    .page-wrapper {
      width: 100%;
      max-width: 360px;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    /* ── Logo ── */
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #f9a87a 0%, #e85d35 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(232, 93, 53, 0.25);
    }
    .logo svg { width: 36px; height: 36px; }

    /* ── Title ── */
    .title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--foreground);
      /* SplitText 會把文字拆開，需要設定 overflow visible */
      overflow: visible;
    }

    /* ── Form ── */
    form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .input-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--fg-60);
      letter-spacing: 0.01em;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--fg-20);
      border-radius: var(--radius);
      background: var(--white);
      font-family: inherit;
      font-size: 15px;
      color: var(--foreground);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper input::placeholder { color: var(--fg-40); }
    .input-wrapper input:focus {
      border-color: rgba(28, 25, 23, 0.4);
      box-shadow: 0 0 0 3px rgba(28, 25, 23, 0.06);
    }

    .hint {
      font-size: 12px;
      color: var(--fg-40);
    }

    /* ── Button ── */
    .btn-continue {
      align-self: flex-end;
      padding: 10px 24px;
      background: var(--primary);
      color: var(--white);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-continue:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-continue:active { transform: translateY(0); }

    /* ── Form reveal wipe ── */
    .form-reveal-wrapper {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 8px;
      /* extra breathing room so input focus ring isn't clipped */
      padding: 4px;
      margin: -4px;
      border-radius: 4px;
    }

    .dust-wipe {
      position: absolute;
      inset: -2px;
      background: var(--bg);
      pointer-events: none;
    }

    /* ── Replay button (demo only) ── */
    .replay-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 8px 16px;
      background: var(--foreground);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .replay-btn:hover { opacity: 1; }
  </style>
</head>
<body>

<div class="page-wrapper">
  <div class="header">
    <!-- Logo -->
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21.593c-.525-.327-3.702-2.374-5.928-4.599C3.838 14.756 2 12.788 2 10.5
                 2 7.467 4.467 5 7.5 5c1.326 0 2.6.527 3.536 1.464L12 7.428l.964-.964
                 C13.9 5.527 15.174 5 16.5 5 19.533 5 22 7.467 22 10.5c0 2.288-1.838 4.256-4.072
                 6.494C15.702 19.219 12.525 21.266 12 21.593z"
              fill="white" fill-opacity="0.9"/>
      </svg>
    </div>

    <!-- Title (SplitText target) -->
    <h1 class="title">嗨，謝謝你來</h1>
  </div>

  <form>
    <div class="input-block">
      <!-- Subtitle (SplitText target) -->
      <label class="subtitle" for="nickname">我可以怎麼稱呼你？</label>

      <!-- Input + Hint：一整塊，對角線擦出 -->
      <div class="form-reveal-wrapper">
        <div class="input-wrapper">
          <input id="nickname" type="text" placeholder="輸入你的暱稱" autocomplete="off" />
        </div>
        <p class="hint">可以先維持空白，隨時歡迎你修改！</p>
        <div class="dust-wipe" aria-hidden="true"></div>
      </div>
    </div>

    <!-- Button -->
    <button type="button" class="btn-continue">繼續 →</button>
  </form>
</div>

<!-- Demo replay button -->
<button class="replay-btn" id="replayBtn">↺ 重播動畫</button>

<!-- GSAP 3.12.5（確保 CDN 可用；React 實作改用 npm install gsap 搭配 GSAP 4） -->
 <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    gsap.registerPlugin(SplitText);

    // ═══════════════════════════════════════════
    //  調整這裡的數值來改變動畫感覺
    // ═══════════════════════════════════════════
    const CONFIG = {
      // 整體速度倍率（1 = 正常，0.5 = 慢兩倍，2 = 快兩倍）
      speed: 1,

      // 第一個元素出現前的停頓（秒）
      initialDelay: 0.3,

      // 各段之間的重疊（負值 = 前一個還沒結束就接下一個）
      // 0 = 完全依序；'-=0.2' = 微重疊；'-=0.5' = 明顯重疊
      overlap: '-=0.2',

      logo: {
        duration: 0.85,
        y: 180,
        scaleFrom: 0.55,
        ease: 'back.out(1.6)',
      },

      titleChars: {
        duration: 0.55,
        y: 48,         // 逐字位移（px）
        stagger: 0.07, // 每字間隔（秒）
        ease: 'power3.out',
      },

      subtitleWords: {
        duration: 0.5,
        y: 28,
        stagger: 0.12,
        ease: 'power2.out',
      },

      // Input + Hint：對角線擦出（左下 → 右上）
      formBlock: {
        duration: 0.85,
        ease: 'power2.inOut',
      },

      button: {
        duration: 0.55,
        y: 24,
        scaleFrom: 0.78,
        ease: 'back.out(1.9)',
      },
    };
    // ═══════════════════════════════════════════

    let titleSplit, subtitleSplit;

    function buildAnimation() {
      const s = 1 / CONFIG.speed;

      gsap.set(['.logo', '.title', '.subtitle', '.btn-continue'], { clearProps: 'all' });
      gsap.set('.dust-wipe', { xPercent: 0, yPercent: 0 });

      if (titleSplit)    titleSplit.revert();
      if (subtitleSplit) subtitleSplit.revert();

      titleSplit    = new SplitText('.title',    { type: 'chars' });
      subtitleSplit = new SplitText('.subtitle', { type: 'words' });

      const tl = gsap.timeline({ delay: CONFIG.initialDelay });

      // 1. Logo：呼吸上升
      tl.from('.logo', {
        scale:    CONFIG.logo.scaleFrom,
        opacity:  0,
        y:        CONFIG.logo.y,
        duration: CONFIG.logo.duration * s,
        ease:     CONFIG.logo.ease,
      });

      // 2. Title：逐字飄入
      tl.from(titleSplit.chars, {
        opacity:  0,
        y:        CONFIG.titleChars.y,
        duration: CONFIG.titleChars.duration * s,
        stagger:  CONFIG.titleChars.stagger * s,
        ease:     CONFIG.titleChars.ease,
      }, CONFIG.overlap);

      // 3. Subtitle：詞組淡入
      tl.from(subtitleSplit.words, {
        opacity:  0,
        y:        CONFIG.subtitleWords.y,
        duration: CONFIG.subtitleWords.duration * s,
        stagger:  CONFIG.subtitleWords.stagger * s,
        ease:     CONFIG.subtitleWords.ease,
      }, CONFIG.overlap);

      // 4. Input + Hint：對角線擦出
      //    dust-wipe 從左下（0,0）移向右上（110%, -110%），
      //    overflow:hidden 使 content 從左下角開始顯露，最後揭出右上角
      tl.to('.dust-wipe', {
        xPercent: 110,
        yPercent: -110,
        duration: CONFIG.formBlock.duration * s,
        ease:     CONFIG.formBlock.ease,
      }, CONFIG.overlap);

      // 5. Button：小彈跳壓軸
      tl.from('.btn-continue', {
        opacity:  0,
        scale:    CONFIG.button.scaleFrom,
        y:        CONFIG.button.y,
        duration: CONFIG.button.duration * s,
        ease:     CONFIG.button.ease,
      }, CONFIG.overlap);

      return tl;
    }

    buildAnimation();

    document.getElementById('replayBtn').addEventListener('click', buildAnimation);
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提案一：暖土煙霧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #d4c8b8;
      background-image:
        radial-gradient(ellipse at 15% 25%, rgba(220,185,145,0.45) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 75%, rgba(180,120,80,0.2) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      font-family: 'Noto Serif TC', serif;
    }

    .proposal-info {
      text-align: center;
      margin-bottom: 30px;
    }
    .proposal-info h1 {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 28px;
      font-weight: 400;
      color: #3a2416;
      letter-spacing: 0.01em;
    }
    .proposal-info .en {
      font-family: 'Libre Baskerville', serif;
      font-size: 11px;
      color: #8a6a54;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .proposal-info .desc {
      font-size: 13px;
      color: #7a5e4a;
      margin-top: 10px;
      line-height: 1.75;
    }
    .tag {
      display: inline-block;
      background: rgba(192,122,82,0.12);
      border: 1px solid rgba(192,122,82,0.3);
      color: #c07a52;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 999px;
      margin: 6px 3px 0;
      font-family: 'Noto Serif TC', serif;
    }

    /* phone frame */
    .phone {
      width: 390px;
      min-height: 760px;
      background: #f5ede0;
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 7px #c8b8a4,
        0 0 0 9px #a89888,
        0 28px 90px rgba(50, 30, 10, 0.32);
      position: relative;
    }

    /* notch */
    .notch {
      width: 120px;
      height: 32px;
      background: #f5ede0;
      border-radius: 0 0 18px 18px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      box-shadow: 0 1px 0 #e0d0bc;
    }

    .status-bar {
      height: 40px;
      padding: 10px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: -40px;
    }
    .status-time {
      font-family: 'Libre Baskerville', serif;
      font-size: 13px;
      font-weight: 700;
      color: #3a2416;
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }

    .app { padding: 4px 18px 56px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 18px;
    }
    .logo-wrap { display: flex; align-items: center; gap: 8px; }
    .logo-box {
      width: 38px;
      height: 38px;
      background: linear-gradient(145deg, #d4906a, #a85e38);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(168, 94, 56, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .logo-box svg { width: 22px; height: 22px; fill: rgba(255,255,255,0.92); }
    .logo-text {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 14px;
      color: #7a5840;
      letter-spacing: 0.03em;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid #c8a080;
      color: #8a5e40;
      font-family: 'Noto Serif TC', serif;
      font-size: 13px;
      padding: 7px 18px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 22px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #c0a080;
      width: 15px;
      height: 15px;
    }
    .search-input {
      width: 100%;
      background: rgba(255,252,248,0.8);
      border: 1px solid #ddc8b0;
      border-radius: 12px;
      padding: 12px 14px 12px 40px;
      font-family: 'Noto Serif TC', serif;
      font-size: 14px;
      color: #3a2416;
      outline: none;
    }
    .search-input::placeholder { color: #c0a080; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 10px;
    }
    .section-title {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 18px;
      font-weight: 400;
      color: #3a2416;
      white-space: nowrap;
    }
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1.5px dashed #c07a52;
      color: #c07a52;
      font-family: 'Noto Serif TC', serif;
      font-size: 12.5px;
      padding: 7px 15px;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sort-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .sort-pill {
      background: transparent;
      border: 1px solid #d8c0a8;
      color: #9e7e6a;
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      padding: 5px 13px;
      border-radius: 999px;
      cursor: pointer;
    }
    .sort-pill.active {
      border-color: #c07a52;
      color: #c07a52;
      background: rgba(192, 122, 82, 0.07);
    }

    .filter-row {
      display: flex;
      justify-content: flex-end;
      border-bottom: 1px solid #ddc8b0;
      margin-bottom: 18px;
    }
    .filter-tab {
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1px;
      font-family: 'Noto Serif TC', serif;
      font-size: 13px;
      color: #9e7e6a;
      padding: 8px 14px;
      cursor: pointer;
    }
    .filter-tab.active { color: #c07a52; border-bottom-color: #c07a52; }

    .card {
      background: rgba(255,252,248,0.85);
      border: 1px solid #e4d0b8;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .card-row { display: flex; gap: 12px; align-items: flex-start; }
    .thumb {
      width: 54px;
      height: 54px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-letter {
      background: linear-gradient(135deg, #dca882, #c07a52);
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 600;
      color: #fff;
    }
    .thumb-photo {
      background: linear-gradient(135deg, #f0c890 0%, #d49070 45%, #a06848 100%);
      border: 2px solid rgba(255,255,255,0.5);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.05);
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      font-weight: 500;
      color: #3a2416;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .badge {
      font-family: 'Noto Serif TC', serif;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 999px;
    }
    .badge-shared { background: #ddeade; color: #3d7048; border: 1px solid #b4d4b8; }
    .btn-sm {
      background: transparent;
      border: 1px dashed #c8a880;
      color: #a88060;
      font-family: 'Noto Serif TC', serif;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 999px;
      cursor: pointer;
    }
    .icon-btn {
      background: none;
      border: none;
      padding: 3px;
      cursor: pointer;
      color: #c0a080;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
    }
    .card-footer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e4d0b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .meta-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      color: #b09070;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn-remove {
      background: transparent;
      border: 1px solid #ddc8b0;
      color: #9e7e6a;
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      padding: 4px 13px;
      border-radius: 999px;
      cursor: pointer;
    }
    .heart-row {
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      color: #c09080;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .card-desc {
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      color: #9e7e6a;
      margin-top: 10px;
      line-height: 1.6;
      padding-top: 10px;
      border-top: 1px solid #e4d0b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .swatches {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }
    .sw {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .sw-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
    }
    .sw-label {
      font-family: 'Libre Baskerville', serif;
      font-size: 8px;
      color: #7a6050;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="proposal-info">
    <h1>提案一：暖土煙霧</h1>
    <p class="en">Warm Earth Mist</p>
    <p class="desc">保留現有大地色調，全面改用輪廓按鈕取代實心深色<br>讓互動元素融入背景而非搶奪視線</p>
    <div>
      <span class="tag">沿用現有色調</span>
      <span class="tag">輪廓/虛線按鈕</span>
      <span class="tag">斜體 Serif 標題</span>
    </div>
  </div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="#3a2416">
          <rect x="0" y="5" width="3" height="7" rx="0.6"/>
          <rect x="4.5" y="3" width="3" height="9" rx="0.6"/>
          <rect x="9" y="1.5" width="3" height="10.5" rx="0.6"/>
          <rect x="13.5" y="0" width="2.5" height="12" rx="0.6"/>
        </svg>
        <svg width="26" height="12" viewBox="0 0 26 12">
          <rect x="0" y="1" width="22" height="10" rx="2.5" stroke="#3a2416" stroke-width="1.3" fill="none"/>
          <rect x="1.5" y="2.5" width="14" height="7" rx="1.5" fill="#3a2416"/>
          <path d="M23.5 4.5v3c.9-.4 1.5-1 1.5-1.5s-.6-1.1-1.5-1.5z" fill="#3a2416"/>
        </svg>
      </div>
    </div>

    <div class="app">
      <header>
        <div class="logo-wrap">
          <div class="logo-box">
            <svg viewBox="0 0 24 24">
              <path d="M12 3.5 C10 5 6.5 7 5 10 C3.5 13 5 16 8 17 C10 17.8 11.5 16.5 12 14.5 C12.5 16.5 14 17.8 16 17 C19 16 20.5 13 19 10 C17.5 7 14 5 12 3.5Z"/>
              <rect x="11" y="17" width="2" height="4" rx="1"/>
              <rect x="8.5" y="20.5" width="7" height="1.5" rx="0.75"/>
            </svg>
          </div>
          <span class="logo-text">愛10克</span>
        </div>
        <button class="btn-logout">登出</button>
      </header>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" placeholder="搜尋記憶書標題...">
      </div>

      <div class="section-header">
        <h2 class="section-title">謝謝你，幫我記住</h2>
        <button class="btn-add">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          新增記憶書
        </button>
      </div>

      <div class="sort-row">
        <button class="sort-pill active">新→舊</button>
        <button class="sort-pill">舊→新</button>
        <button class="sort-pill">A→Z</button>
      </div>

      <div class="filter-row">
        <button class="filter-tab active">全部</button>
        <button class="filter-tab">已分享</button>
        <button class="filter-tab">草稿</button>
      </div>

      <div class="card">
        <div class="card-row">
          <div class="thumb thumb-letter">測</div>
          <div class="card-body">
            <div class="card-title">測試兩本書</div>
            <div class="badge-row">
              <span class="badge badge-shared">已分享</span>
              <button class="btn-sm">+ 標籤</button>
              <button class="icon-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="card-footer">
          <span class="meta-text">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            寄生仲杰（編輯中）
          </span>
          <button class="btn-remove">移除</button>
        </div>
      </div>

      <div class="card">
        <div class="card-row">
          <div class="thumb thumb-photo"></div>
          <div class="card-body">
            <div class="card-title">測試一本書</div>
            <div class="badge-row">
              <span class="heart-row">♡ 2</span>
              <span class="badge badge-shared">已分享</span>
              <button class="btn-sm">+ 標籤</button>
              <button class="icon-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="card-desc">我們的第一次旅行——那個夏天，我們第一次一起...</div>
      </div>

    </div>
  </div>

  <div class="swatches">
    <div class="sw"><div class="sw-circle" style="background:#f5ede0"></div><span class="sw-label">背景</span></div>
    <div class="sw"><div class="sw-circle" style="background:#fdf9f4"></div><span class="sw-label">卡片</span></div>
    <div class="sw"><div class="sw-circle" style="background:#c07a52"></div><span class="sw-label">主色</span></div>
    <div class="sw"><div class="sw-circle" style="background:#e4d0b8"></div><span class="sw-label">線框</span></div>
    <div class="sw"><div class="sw-circle" style="background:#3a2416"></div><span class="sw-label">文字</span></div>
    <div class="sw"><div class="sw-circle" style="background:#3d7048"></div><span class="sw-label">分享</span></div>
  </div>

</body>
</html>

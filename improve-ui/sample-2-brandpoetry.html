<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提案二：藍灰詩箋（修訂）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 設計 token ──────────────────────────────────────────── */
    :root {
      --bg:           #ecebf4;
      --bg-outer:     #cccae0;
      --card:         rgba(255,255,255,0.8);
      --primary:      #3d6b7c;     /* 鴨頭綠，互動主色 */
      --text:         #2d3848;
      --text-muted:   #7a8fa0;
      --border:       #c8c4e0;
      --gold:         180, 148, 90; /* rgb — 只用透明度形式 */
      --danger:       #c84b4b;
    }

    body {
      min-height: 100vh;
      background: var(--bg-outer);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(200,195,230,0.6) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(155,180,195,0.3) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      font-family: 'Noto Sans TC', sans-serif;
    }

    /* ── 提案說明 ─────────────────────────────────────────────── */
    .proposal-info {
      text-align: center;
      margin-bottom: 30px;
    }
    .proposal-info h1 {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 28px;
      font-weight: 400;
      color: #2d3848;
      letter-spacing: 0.01em;
    }
    .proposal-info .en {
      font-family: 'Lora', serif;
      font-size: 11px;
      color: #5a6e80;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .proposal-info .desc {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      color: #4a5e70;
      margin-top: 10px;
      line-height: 1.75;
      font-weight: 300;
    }
    .tag {
      display: inline-block;
      background: rgba(74, 124, 142, 0.1);
      border: 1px solid rgba(74, 124, 142, 0.28);
      color: #4a7c8e;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 999px;
      margin: 6px 3px 0;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 400;
    }
    .tag-danger {
      background: rgba(200, 75, 75, 0.08);
      border-color: rgba(200, 75, 75, 0.3);
      color: var(--danger);
    }
    .tag-gold {
      background: rgba(var(--gold), 0.08);
      border-color: rgba(var(--gold), 0.3);
      color: #9a7c48;
    }

    /* ── 手機框 ────────────────────────────────────────────────── */
    .phone {
      width: 390px;
      min-height: 760px;
      background: var(--bg);
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 7px #b8b5d0,
        0 0 0 9px #9895b8,
        0 28px 90px rgba(30, 25, 65, 0.28);
    }

    .notch {
      width: 120px;
      height: 32px;
      background: var(--bg);
      border-radius: 0 0 18px 18px;
      margin: 0 auto;
      box-shadow: 0 1px 0 #d8d5ec;
    }

    .status-bar {
      height: 40px;
      padding: 10px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: -40px;
    }
    .status-time {
      font-family: 'Lora', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }

    .app { padding: 4px 18px 56px; }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 18px;
    }
    .logo-wrap { display: flex; align-items: center; gap: 9px; }
    .logo-box {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(61, 107, 124, 0.4);
    }
    .logo-box svg { width: 22px; height: 22px; fill: rgba(255,255,255,0.92); }
    .logo-text {
      font-family: 'Lora', serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--primary);
      letter-spacing: 0.04em;
    }

    /* 登出 — 危險紅 */
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(200, 75, 75, 0.45);
      color: var(--danger);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 7px 18px;
      border-radius: 999px;
      cursor: pointer;
    }

    /* ── 搜尋 ────────────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 22px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #8aa4b0;
      width: 15px;
      height: 15px;
    }
    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px 12px 40px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      outline: none;
    }
    .search-input::placeholder { color: #9ab0bc; }

    /* ── Section header ──────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 10px;
    }
    .section-title {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
    }
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--primary);
      border: none;
      color: #fff;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12.5px;
      font-weight: 400;
      padding: 8px 15px;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(61, 107, 124, 0.3);
    }

    /* ── 排序 / 篩選 ─────────────────────────────────────────────── */
    .sort-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .sort-pill {
      background: transparent;
      border: 1px solid #c0bcdc;
      color: var(--text-muted);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      font-weight: 300;
      padding: 5px 13px;
      border-radius: 999px;
      cursor: pointer;
    }
    .sort-pill.active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(61, 107, 124, 0.08);
    }

    /* 篩選 tab 分隔線 — 淡金色 */
    .filter-row {
      display: flex;
      justify-content: flex-end;
      border-bottom: 1px solid rgba(var(--gold), 0.2);
      margin-bottom: 18px;
    }
    .filter-tab {
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      padding: 8px 14px;
      cursor: pointer;
    }
    .filter-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── 書本卡片 ─────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: none;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(61, 90, 130, 0.08), 0 0 0 1px rgba(180,175,210,0.25);
    }
    .card-row { display: flex; gap: 12px; align-items: flex-start; }
    .thumb {
      width: 54px;
      height: 54px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-letter {
      background: linear-gradient(135deg, #5a9cb0, #3d6b7c);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 22px;
      font-weight: 500;
      color: #fff;
    }
    .thumb-photo {
      background: linear-gradient(135deg, #d4e8f0 0%, #8abccc 45%, #4d8a9e 100%);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.06);
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .badge {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 11px;
      font-weight: 400;
      padding: 3px 9px;
      border-radius: 999px;
    }
    .badge-shared { background: #d8eedc; color: #2e6e48; border: 1px solid #a8d4b0; }
    .btn-sm {
      background: transparent;
      border: 1px solid #b8b4d0;
      color: var(--text-muted);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 11px;
      font-weight: 300;
      padding: 3px 9px;
      border-radius: 999px;
      cursor: pointer;
    }
    .icon-btn {
      background: none;
      border: none;
      padding: 3px;
      cursor: pointer;
      color: #9ab0bc;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
    }

    /* 卡片 footer 分隔線 — 淡金色 */
    .card-footer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(var(--gold), 0.22);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .meta-text {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: #8aa4b4;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 移除 — 危險紅 */
    .btn-remove {
      background: transparent;
      border: 1px solid rgba(200, 75, 75, 0.4);
      color: var(--danger);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      font-weight: 300;
      padding: 4px 13px;
      border-radius: 999px;
      cursor: pointer;
    }

    .heart-row {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      color: #d08080;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* 卡片 desc 分隔線 — 淡金色 */
    .card-desc {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: var(--text-muted);
      margin-top: 10px;
      line-height: 1.6;
      padding-top: 10px;
      border-top: 1px solid rgba(var(--gold), 0.18);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Dot indicators（圖片輪播 / FullscreenGallery）────────────── */
    .dot-demo {
      padding: 18px 0 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .dot-demo-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: #9ab0bc;
      letter-spacing: 0.05em;
    }
    /* 圖片占位 */
    .dot-image-placeholder {
      width: 100%;
      height: 130px;
      background: linear-gradient(135deg, #d4e8f0 0%, #8abccc 60%, #4d8a9e 100%);
      border-radius: 10px;
    }
    .dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }
    .dot {
      border-radius: 50%;
      transition: all 0.2s;
    }
    .dot-active {
      width: 9px;
      height: 9px;
      background: rgba(var(--gold), 0.85);
    }
    .dot-inactive {
      width: 7px;
      height: 7px;
      background: rgba(var(--gold), 0.32);
    }

    /* ── 色票 ────────────────────────────────────────────────────── */
    .swatches {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }
    .sw { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .sw-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
    }
    .sw-label {
      font-family: 'Lora', serif;
      font-size: 8px;
      color: #4a5e70;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="proposal-info">
    <h1>提案二：藍灰詩箋</h1>
    <p class="en">Blue-Gray Poetry — revised</p>
    <p class="desc">品牌霧藍灰 + 鴨頭綠互動主色<br>淡金分隔線與 dot 為冷調版面加一絲暖意<br>移除 / 登出等危險操作以紅色輪廓區分</p>
    <div>
      <span class="tag">品牌霧藍灰</span>
      <span class="tag">鴨頭綠按鈕</span>
      <span class="tag-gold tag">淡金分隔 &amp; dots</span>
      <span class="tag-danger tag">紅色危險按鈕</span>
    </div>
  </div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="#2d3848">
          <rect x="0" y="5" width="3" height="7" rx="0.6"/>
          <rect x="4.5" y="3" width="3" height="9" rx="0.6"/>
          <rect x="9" y="1.5" width="3" height="10.5" rx="0.6"/>
          <rect x="13.5" y="0" width="2.5" height="12" rx="0.6"/>
        </svg>
        <svg width="26" height="12" viewBox="0 0 26 12">
          <rect x="0" y="1" width="22" height="10" rx="2.5" stroke="#2d3848" stroke-width="1.3" fill="none"/>
          <rect x="1.5" y="2.5" width="14" height="7" rx="1.5" fill="#2d3848"/>
          <path d="M23.5 4.5v3c.9-.4 1.5-1 1.5-1.5s-.6-1.1-1.5-1.5z" fill="#2d3848"/>
        </svg>
      </div>
    </div>

    <div class="app">
      <header>
        <div class="logo-wrap">
          <div class="logo-box">
            <svg viewBox="0 0 24 24">
              <rect x="11" y="4" width="2" height="14" rx="1"/>
              <rect x="4" y="4" width="16" height="1.5" rx="0.75"/>
              <path d="M4 5.5 Q4 10 8 10 Q12 10 12 5.5" stroke="white" stroke-width="1.2" fill="rgba(255,255,255,0.3)"/>
              <path d="M12 5.5 Q12 10 16 10 Q20 10 20 5.5" stroke="white" stroke-width="1.2" fill="rgba(255,255,255,0.3)"/>
              <circle cx="7" cy="3.5" r="1.2" fill="rgba(255,255,255,0.85)"/>
              <circle cx="17" cy="3.5" r="1.2" fill="rgba(255,255,255,0.85)"/>
              <rect x="10" y="18" width="4" height="1.5" rx="0.75" fill="rgba(255,255,255,0.7)"/>
            </svg>
          </div>
          <span class="logo-text">愛10克</span>
        </div>
        <button class="btn-logout">登出</button>
      </header>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" placeholder="搜尋記憶書標題...">
      </div>

      <div class="section-header">
        <h2 class="section-title">謝謝你，幫我記住</h2>
        <button class="btn-add">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          新增記憶書
        </button>
      </div>

      <div class="sort-row">
        <button class="sort-pill active">新→舊</button>
        <button class="sort-pill">舊→新</button>
        <button class="sort-pill">A→Z</button>
      </div>

      <!-- 篩選 tab：淡金分隔線 -->
      <div class="filter-row">
        <button class="filter-tab active">全部</button>
        <button class="filter-tab">已分享</button>
        <button class="filter-tab">草稿</button>
      </div>

      <!-- 書卡：有 editor，footer 顯示移除（紅色） -->
      <div class="card">
        <div class="card-row">
          <div class="thumb thumb-letter">測</div>
          <div class="card-body">
            <div class="card-title">測試兩本書</div>
            <div class="badge-row">
              <span class="badge badge-shared">已分享</span>
              <button class="btn-sm">+ 標籤</button>
              <button class="icon-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
            </div>
          </div>
        </div>
        <!-- footer 分隔線：淡金色 -->
        <div class="card-footer">
          <span class="meta-text">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            寄生仲杰（編輯中）
          </span>
          <button class="btn-remove">移除編輯者</button>
        </div>
      </div>

      <!-- 書卡：有描述，描述上方淡金分隔 -->
      <div class="card">
        <div class="card-row">
          <div class="thumb thumb-photo"></div>
          <div class="card-body">
            <div class="card-title">測試一本書</div>
            <div class="badge-row">
              <span class="heart-row">♡ 2</span>
              <span class="badge badge-shared">已分享</span>
              <button class="btn-sm">+ 標籤</button>
              <button class="icon-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
            </div>
          </div>
        </div>
        <!-- 描述分隔線：淡金色 -->
        <div class="card-desc">我們的第一次旅行——那個夏天，我們第一次一起...</div>
      </div>

      <!-- 圖片輪播 dot 示意 -->
      <div class="dot-demo">
        <div class="dot-image-placeholder"></div>
        <div class="dots">
          <div class="dot dot-active"></div>
          <div class="dot dot-inactive"></div>
          <div class="dot dot-inactive"></div>
          <div class="dot dot-inactive"></div>
        </div>
        <span class="dot-demo-label">圖片輪播 / FullscreenGallery dot</span>
      </div>

    </div>
  </div>

  <!-- 色票 -->
  <div class="swatches">
    <div class="sw"><div class="sw-circle" style="background:#ecebf4"></div><span class="sw-label">背景</span></div>
    <div class="sw"><div class="sw-circle" style="background:#ffffff"></div><span class="sw-label">卡片</span></div>
    <div class="sw"><div class="sw-circle" style="background:#3d6b7c"></div><span class="sw-label">主色</span></div>
    <div class="sw"><div class="sw-circle" style="background:#c8c4e0"></div><span class="sw-label">線框</span></div>
    <div class="sw"><div class="sw-circle" style="background:#b49550; border-color: rgba(180,148,90,0.3)"></div><span class="sw-label">金 (分隔)</span></div>
    <div class="sw"><div class="sw-circle" style="background:#c84b4b"></div><span class="sw-label">危險</span></div>
    <div class="sw"><div class="sw-circle" style="background:#d08080"></div><span class="sw-label">愛心</span></div>
  </div>

</body>
</html>

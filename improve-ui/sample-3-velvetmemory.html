<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提案三：絲絨記憶</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Noto+Serif+TC:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0d1a;
      background-image:
        radial-gradient(ellipse at 30% 20%, rgba(80,60,120,0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 80%, rgba(60,90,80,0.2) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      font-family: 'Noto Serif TC', serif;
    }

    .proposal-info {
      text-align: center;
      margin-bottom: 30px;
    }
    .proposal-info h1 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 32px;
      font-weight: 300;
      color: #d4a86a;
      letter-spacing: 0.04em;
    }
    .proposal-info .en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      color: #7a7098;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .proposal-info .desc {
      font-family: 'Noto Serif TC', serif;
      font-size: 13px;
      font-weight: 300;
      color: #9e98b8;
      margin-top: 10px;
      line-height: 1.75;
    }
    .tag {
      display: inline-block;
      background: rgba(212, 168, 106, 0.1);
      border: 1px solid rgba(212, 168, 106, 0.25);
      color: #d4a86a;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 999px;
      margin: 6px 3px 0;
      font-family: 'Noto Serif TC', serif;
      font-weight: 300;
    }

    /* phone frame */
    .phone {
      width: 390px;
      min-height: 760px;
      background: #1c1829;
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(212, 168, 106, 0.15),
        0 0 0 7px #2a2540,
        0 0 0 9px #1a1730,
        0 28px 100px rgba(0, 0, 0, 0.7),
        0 0 60px rgba(100, 80, 150, 0.1);
      position: relative;
    }

    /* subtle grain texture overlay */
    .phone::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.4;
    }

    .notch {
      width: 120px;
      height: 32px;
      background: #1c1829;
      border-radius: 0 0 18px 18px;
      margin: 0 auto;
      box-shadow: 0 1px 0 rgba(212,168,106,0.08);
    }

    .status-bar {
      height: 40px;
      padding: 10px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: -40px;
      position: relative;
      z-index: 5;
    }
    .status-time {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 600;
      color: #f0e8d8;
      letter-spacing: 0.03em;
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }

    .app { padding: 4px 18px 56px; position: relative; z-index: 5; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 18px;
    }
    .logo-wrap { display: flex; align-items: center; gap: 9px; }
    .logo-box {
      width: 38px;
      height: 38px;
      background: linear-gradient(145deg, #3a3050, #252038);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(212, 168, 106, 0.3);
      box-shadow:
        0 0 0 0 rgba(212, 168, 106, 0),
        inset 0 1px 0 rgba(212, 168, 106, 0.1);
    }
    .logo-box svg { width: 22px; height: 22px; fill: #d4a86a; }
    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 400;
      color: #d4a86a;
      letter-spacing: 0.06em;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(212, 168, 106, 0.3);
      color: #c09858;
      font-family: 'Noto Serif TC', serif;
      font-size: 13px;
      font-weight: 300;
      padding: 7px 18px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.03em;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 22px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #5a5478;
      width: 15px;
      height: 15px;
    }
    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212, 168, 106, 0.18);
      border-radius: 12px;
      padding: 12px 14px 12px 40px;
      font-family: 'Noto Serif TC', serif;
      font-size: 14px;
      font-weight: 300;
      color: #d8d0e8;
      outline: none;
    }
    .search-input::placeholder { color: #4e4870; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 10px;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 20px;
      font-weight: 300;
      color: #f0e8d8;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid rgba(212, 168, 106, 0.5);
      color: #d4a86a;
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      font-weight: 300;
      padding: 8px 15px;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .sort-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .sort-pill {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: #5a5478;
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      font-weight: 300;
      padding: 5px 13px;
      border-radius: 999px;
      cursor: pointer;
    }
    .sort-pill.active {
      border-color: rgba(212, 168, 106, 0.45);
      color: #d4a86a;
      background: rgba(212, 168, 106, 0.06);
    }

    .filter-row {
      display: flex;
      justify-content: flex-end;
      border-bottom: 1px solid rgba(212, 168, 106, 0.1);
      margin-bottom: 18px;
    }
    .filter-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: 'Noto Serif TC', serif;
      font-size: 13px;
      font-weight: 300;
      color: #4e4870;
      padding: 8px 14px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    .filter-tab.active { color: #d4a86a; border-bottom-color: #d4a86a; }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(212, 168, 106, 0.1);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
      pointer-events: none;
    }
    .card-row { display: flex; gap: 12px; align-items: flex-start; }
    .thumb {
      width: 54px;
      height: 54px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .thumb-letter {
      background: linear-gradient(135deg, #3a3050, #252038);
      border: 1px solid rgba(212, 168, 106, 0.25);
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 400;
      color: #d4a86a;
    }
    .thumb-photo {
      background: linear-gradient(135deg, #2a3040 0%, #3a4858 45%, #2a3850 100%);
      border: 1px solid rgba(212, 168, 106, 0.15);
      box-shadow: 0 0 20px rgba(100,150,180,0.1) inset;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      font-weight: 400;
      color: #e8e0d0;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.02em;
    }
    .badge-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .badge {
      font-family: 'Noto Serif TC', serif;
      font-size: 11px;
      font-weight: 300;
      padding: 3px 9px;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }
    .badge-shared {
      background: rgba(126, 184, 164, 0.12);
      color: #7eb8a4;
      border: 1px solid rgba(126, 184, 164, 0.25);
    }
    .btn-sm {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: #5a5478;
      font-family: 'Noto Serif TC', serif;
      font-size: 11px;
      font-weight: 300;
      padding: 3px 9px;
      border-radius: 999px;
      cursor: pointer;
    }
    .icon-btn {
      background: none;
      border: none;
      padding: 3px;
      cursor: pointer;
      color: #4e4870;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
    }
    .card-footer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(212, 168, 106, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .meta-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      font-weight: 300;
      color: #4e4870;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn-remove {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: #4e4870;
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      font-weight: 300;
      padding: 4px 13px;
      border-radius: 999px;
      cursor: pointer;
    }
    .heart-row {
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      color: #c08878;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .card-desc {
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      font-weight: 300;
      color: #5a5478;
      margin-top: 10px;
      line-height: 1.6;
      padding-top: 10px;
      border-top: 1px solid rgba(212, 168, 106, 0.08);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.02em;
    }

    /* ambient glow at bottom */
    .bottom-glow {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      height: 120px;
      background: radial-gradient(ellipse at center, rgba(212, 168, 106, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .swatches {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }
    .sw { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .sw-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(212, 168, 106, 0.2);
    }
    .sw-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 9px;
      color: #5a5478;
      letter-spacing: 0.08em;
    }

    /* decorative stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--d, 3s) var(--delay, 0s) infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--o, 0.3); }
    }
  </style>
</head>
<body>

  <!-- background stars -->
  <div class="stars" aria-hidden="true">
    <div class="star" style="top:8%;left:12%;--d:4.2s;--delay:0.3s;--o:0.4"></div>
    <div class="star" style="top:14%;left:78%;--d:3.8s;--delay:1.1s;--o:0.3"></div>
    <div class="star" style="top:22%;left:55%;--d:5.1s;--delay:0.7s;--o:0.25"></div>
    <div class="star" style="top:6%;left:38%;--d:3.2s;--delay:2.0s;--o:0.35"></div>
    <div class="star" style="top:30%;left:88%;--d:4.7s;--delay:0.5s;--o:0.3"></div>
    <div class="star" style="top:18%;left:5%;--d:3.5s;--delay:1.8s;--o:0.2"></div>
    <div class="star" style="top:5%;left:92%;--d:4.0s;--delay:0.9s;--o:0.4"></div>
    <div class="star" style="top:25%;left:25%;--d:5.5s;--delay:1.3s;--o:0.2"></div>
    <div class="star" style="top:85%;left:15%;--d:4.1s;--delay:0.2s;--o:0.3"></div>
    <div class="star" style="top:88%;left:85%;--d:3.9s;--delay:1.5s;--o:0.25"></div>
    <div class="star" style="top:75%;left:60%;--d:5.0s;--delay:0.8s;--o:0.2"></div>
    <div class="star" style="top:92%;left:40%;--d:3.7s;--delay:2.1s;--o:0.35"></div>
  </div>

  <div class="proposal-info" style="position:relative;z-index:1;">
    <h1>提案三：絲絨記憶</h1>
    <p class="en">Velvet Memory</p>
    <p class="desc">從「私人珍藏記憶書」本質出發<br>暗色底調如燈光下翻閱相冊，金色點綴如記憶的光澤</p>
    <div>
      <span class="tag">深夜相冊感</span>
      <span class="tag">黃金幽靈按鈕</span>
      <span class="tag">Cormorant 典雅字型</span>
    </div>
  </div>

  <div class="phone" style="position:relative;z-index:1;">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="#d4a86a" opacity="0.7">
          <rect x="0" y="5" width="3" height="7" rx="0.6"/>
          <rect x="4.5" y="3" width="3" height="9" rx="0.6"/>
          <rect x="9" y="1.5" width="3" height="10.5" rx="0.6"/>
          <rect x="13.5" y="0" width="2.5" height="12" rx="0.6"/>
        </svg>
        <svg width="26" height="12" viewBox="0 0 26 12">
          <rect x="0" y="1" width="22" height="10" rx="2.5" stroke="#d4a86a" stroke-width="1.3" fill="none" opacity="0.7"/>
          <rect x="1.5" y="2.5" width="10" height="7" rx="1.5" fill="#d4a86a" opacity="0.7"/>
          <path d="M23.5 4.5v3c.9-.4 1.5-1 1.5-1.5s-.6-1.1-1.5-1.5z" fill="#d4a86a" opacity="0.7"/>
        </svg>
      </div>
    </div>

    <div class="app">
      <header>
        <div class="logo-wrap">
          <div class="logo-box">
            <svg viewBox="0 0 24 24">
              <rect x="11" y="4" width="2" height="13" rx="1" fill="#d4a86a"/>
              <rect x="4.5" y="4" width="15" height="1.5" rx="0.75" fill="#d4a86a"/>
              <path d="M4.5 5.5 Q4.5 9.5 7.8 9.5 Q11 9.5 11 5.5" stroke="#d4a86a" stroke-width="1.2" fill="rgba(212,168,106,0.2)"/>
              <path d="M13 5.5 Q13 9.5 16.2 9.5 Q19.5 9.5 19.5 5.5" stroke="#d4a86a" stroke-width="1.2" fill="rgba(212,168,106,0.2)"/>
              <circle cx="7.5" cy="3.5" r="1.2" fill="#d4a86a" opacity="0.7"/>
              <circle cx="16.5" cy="3.5" r="1.2" fill="#d4a86a" opacity="0.7"/>
              <rect x="10" y="17" width="4" height="1.2" rx="0.6" fill="#d4a86a" opacity="0.5"/>
            </svg>
          </div>
          <span class="logo-text">愛10克</span>
        </div>
        <button class="btn-logout">登出</button>
      </header>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" placeholder="搜尋記憶書標題...">
      </div>

      <div class="section-header">
        <h2 class="section-title">謝謝你，幫我記住</h2>
        <button class="btn-add">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          新增記憶書
        </button>
      </div>

      <div class="sort-row">
        <button class="sort-pill active">新→舊</button>
        <button class="sort-pill">舊→新</button>
        <button class="sort-pill">A→Z</button>
      </div>

      <div class="filter-row">
        <button class="filter-tab active">全部</button>
        <button class="filter-tab">已分享</button>
        <button class="filter-tab">草稿</button>
      </div>

      <div class="card">
        <div class="card-row">
          <div class="thumb thumb-letter">測</div>
          <div class="card-body">
            <div class="card-title">測試兩本書</div>
            <div class="badge-row">
              <span class="badge badge-shared">已分享</span>
              <button class="btn-sm">+ 標籤</button>
              <button class="icon-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="card-footer">
          <span class="meta-text">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            寄生仲杰（編輯中）
          </span>
          <button class="btn-remove">移除</button>
        </div>
      </div>

      <div class="card">
        <div class="card-row">
          <div class="thumb thumb-photo"></div>
          <div class="card-body">
            <div class="card-title">測試一本書</div>
            <div class="badge-row">
              <span class="heart-row">♡ 2</span>
              <span class="badge badge-shared">已分享</span>
              <button class="btn-sm">+ 標籤</button>
              <button class="icon-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="card-desc">我們的第一次旅行——那個夏天，我們第一次一起...</div>
      </div>

    </div>

    <div class="bottom-glow"></div>
  </div>

  <div class="swatches" style="position:relative;z-index:1;">
    <div class="sw"><div class="sw-circle" style="background:#1c1829"></div><span class="sw-label">背景</span></div>
    <div class="sw"><div class="sw-circle" style="background:#252338"></div><span class="sw-label">卡片</span></div>
    <div class="sw"><div class="sw-circle" style="background:#d4a86a"></div><span class="sw-label">金色</span></div>
    <div class="sw"><div class="sw-circle" style="background:#7eb8a4"></div><span class="sw-label">薄荷</span></div>
    <div class="sw"><div class="sw-circle" style="background:#f0e8d8"></div><span class="sw-label">文字</span></div>
    <div class="sw"><div class="sw-circle" style="background:#c08878"></div><span class="sw-label">愛心</span></div>
  </div>

</body>
</html>
